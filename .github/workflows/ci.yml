##############################################################################
# CI/CD Pipeline — Fully Automated
#
# Flow:
#   1. Developer pushes code to auth-service/, backend-api/, or frontend/
#   2. CI detects which services changed, builds Docker images in parallel
#   3. Images are pushed to ECR (tagged with commit SHA + latest)
#   4. K8s manifests are updated with new image tags and committed
#   5. ArgoCD detects the manifest change and auto-deploys to EKS
#
# Prevents infinite loops: commits by github-actions[bot] are ignored,
# and the update-manifests commit uses [skip ci] in the message.
##############################################################################

name: CI/CD Pipeline

on:
  workflow_dispatch: # Manual trigger — builds all services
  push:
    branches: [main]
    paths:
      - "auth-service/**"
      - "backend-api/**"
      - "frontend/**"

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 541405370428.dkr.ecr.eu-west-2.amazonaws.com

permissions:
  id-token: write
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Detect which services changed so we only build what's needed
  # ────────────────────────────────────────────────────────────────────────────
  changes:
    # Skip if the commit was made by the CI bot (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'auth-service/**'
            backend:
              - 'backend-api/**'
            frontend:
              - 'frontend/**'

  # ────────────────────────────────────────────────────────────────────────────
  # Auth Service — Build & Push to ECR
  # ────────────────────────────────────────────────────────────────────────────
  build-auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        run: |
          docker build -t $ECR_REGISTRY/voting-app-auth:${{ github.sha }} \
                        -t $ECR_REGISTRY/voting-app-auth:latest \
                        ./auth-service
          docker push $ECR_REGISTRY/voting-app-auth:${{ github.sha }}
          docker push $ECR_REGISTRY/voting-app-auth:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Backend API — Build & Push to ECR
  # ────────────────────────────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        run: |
          docker build -t $ECR_REGISTRY/voting-app-backend:${{ github.sha }} \
                        -t $ECR_REGISTRY/voting-app-backend:latest \
                        ./backend-api
          docker push $ECR_REGISTRY/voting-app-backend:${{ github.sha }}
          docker push $ECR_REGISTRY/voting-app-backend:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — Build & Push to ECR
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        run: |
          docker build -t $ECR_REGISTRY/voting-app-frontend:${{ github.sha }} \
                        -t $ECR_REGISTRY/voting-app-frontend:latest \
                        ./frontend
          docker push $ECR_REGISTRY/voting-app-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/voting-app-frontend:latest

  # ────────────────────────────────────────────────────────────────────────────
  # Update K8s manifests → ArgoCD auto-syncs to EKS
  #
  # This job does NOT need AWS credentials. It simply updates the image tags
  # in the YAML files and pushes to git. ArgoCD handles the rest.
  # ────────────────────────────────────────────────────────────────────────────
  update-manifests:
    needs: [build-auth, build-backend, build-frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.build-auth.result == 'success' || needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in K8s deployment manifests
        run: |
          TAG="${{ github.sha }}"
          REG="${{ env.ECR_REGISTRY }}"

          # Only update tags for services that were actually built
          if [ "${{ needs.build-auth.result }}" = "success" ]; then
            sed -i "s|image: .*/voting-app-auth:.*|image: ${REG}/voting-app-auth:${TAG}|g" k8s/auth-deployment.yaml
            echo "Updated auth-service image to ${TAG}"
          fi

          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            sed -i "s|image: .*/voting-app-backend:.*|image: ${REG}/voting-app-backend:${TAG}|g" k8s/backend-deployment.yaml
            echo "Updated backend-api image to ${TAG}"
          fi

          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            sed -i "s|image: .*/voting-app-frontend:.*|image: ${REG}/voting-app-frontend:${TAG}|g" k8s/frontend-deployment.yaml
            echo "Updated frontend image to ${TAG}"
          fi

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "cd: update image tags to ${{ github.sha }} [skip ci]"
            git push
            echo "Manifests pushed — ArgoCD will auto-sync to EKS"
          fi
