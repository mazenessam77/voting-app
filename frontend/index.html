<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voting App - Live on EKS</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --success-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --input-bg: #0f172a;
      --input-border: #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(16,185,129,0.06) 0%, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 440px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 2.5rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      margin-bottom: 0.85rem;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    input::placeholder { color: var(--text-muted); }

    button {
      width: 100%;
      padding: 0.85rem;
      margin-bottom: 0.65rem;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
    }

    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }

    .candidate-btn {
      background: linear-gradient(135deg, var(--success), #34d399);
      position: relative;
      overflow: hidden;
    }
    .candidate-btn:hover {
      background: linear-gradient(135deg, var(--success-hover), var(--success));
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(16,185,129,0.3);
    }
    .candidate-btn:active { transform: scale(0.98); }

    #refresh-btn { background: var(--primary); }
    #refresh-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

    #logout-btn {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      margin-top: 0.5rem;
    }
    #logout-btn:hover { background: var(--danger); color: #fff; }

    .results { margin-top: 1rem; }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      transition: transform 0.15s;
    }
    .result-row:hover { transform: translateX(4px); }

    .result-name { font-weight: 600; }

    .result-count {
      background: var(--primary);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .bar-container {
      flex: 1;
      height: 6px;
      background: var(--card-border);
      border-radius: 3px;
      margin: 0 1rem;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--success));
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .error {
      color: var(--danger);
      text-align: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(239,68,68,0.1);
    }

    .info {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
    }

    .success-msg {
      color: var(--success);
      text-align: center;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: rgba(16,185,129,0.1);
    }

    h2 {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .divider {
      height: 1px;
      background: var(--card-border);
      margin: 1rem 0;
    }

    .hidden { display: none; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(99,102,241,0.15);
      color: var(--primary);
      margin-left: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Login Screen -->
    <div id="login-screen">
      <div class="logo">&#x1F5F3;&#xFE0F;</div>
      <h1>Voting App</h1>
      <p class="subtitle">Sign in to cast your vote</p>
      <div id="login-error" class="error hidden"></div>
      <input id="username" type="text" placeholder="Username" autocomplete="off" />
      <input id="password" type="password" placeholder="Password" />
      <button id="login-btn" class="btn-primary">Sign In</button>
      <p class="info">Enter any username and password</p>
    </div>

    <!-- Voting Screen -->
    <div id="vote-screen" class="hidden">
      <h1>Cast Your Vote</h1>
      <p class="subtitle" id="welcome-msg">Choose your candidate below</p>
      <div id="vote-msg" class="success-msg hidden"></div>
      <button class="candidate-btn" data-candidate="Alice">Alice</button>
      <button class="candidate-btn" data-candidate="Bob">Bob</button>
      <button class="candidate-btn" data-candidate="Charlie">Charlie</button>
      <button class="candidate-btn" data-candidate="Diana">Diana</button>
      <button class="candidate-btn" data-candidate="Eve">Eve</button>

      <div class="divider"></div>

      <h2>Live Results <span class="badge">REAL-TIME</span></h2>
      <div id="results" class="results"><p class="info">Loading results...</p></div>
      <button id="refresh-btn">Refresh Results</button>
      <button id="logout-btn">Sign Out</button>
    </div>
  </div>

  <!-- env.js is mounted via K8s ConfigMap to inject runtime service URLs -->
  <script src="/env.js"></script>
  <script>
    const AUTH_URL  = window.__ENV__?.AUTH_URL  || "http://localhost:3000";
    const API_URL   = window.__ENV__?.API_URL   || "http://localhost:4000";

    let token = null;

    const loginScreen  = document.getElementById("login-screen");
    const voteScreen   = document.getElementById("vote-screen");
    const loginError   = document.getElementById("login-error");
    const voteMsg      = document.getElementById("vote-msg");
    const resultsDiv   = document.getElementById("results");

    // --- Login ---
    document.getElementById("login-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      loginError.classList.add("hidden");

      try {
        const res = await fetch(`${AUTH_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");

        token = data.token;
        loginScreen.classList.add("hidden");
        voteScreen.classList.remove("hidden");
        voteScreen.classList.add("fade-in");
        document.getElementById("welcome-msg").textContent = `Welcome, ${username}! Choose your candidate`;
        loadResults();
      } catch (err) {
        loginError.textContent = err.message;
        loginError.classList.remove("hidden");
      }
    });

    // --- Vote ---
    document.querySelectorAll(".candidate-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        voteMsg.classList.add("hidden");
        try {
          const res = await fetch(`${API_URL}/vote`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ candidate: btn.dataset.candidate }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Vote failed");

          voteMsg.textContent = `Vote recorded for ${data.candidate}!`;
          voteMsg.classList.remove("hidden");
          loadResults();
        } catch (err) {
          voteMsg.textContent = err.message;
          voteMsg.className = "error";
          voteMsg.classList.remove("hidden");
        }
      });
    });

    // --- Results with bar chart ---
    async function loadResults() {
      try {
        const res = await fetch(`${API_URL}/votes`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load results");

        if (data.length === 0) {
          resultsDiv.innerHTML = '<p class="info">No votes yet. Be the first!</p>';
          return;
        }

        const maxCount = Math.max(...data.map(r => r.count));
        resultsDiv.innerHTML = data
          .map((r) => `
            <div class="result-row">
              <span class="result-name">${r.candidate}</span>
              <div class="bar-container">
                <div class="bar-fill" style="width: ${maxCount > 0 ? (r.count / maxCount * 100) : 0}%"></div>
              </div>
              <span class="result-count">${r.count}</span>
            </div>
          `).join("");
      } catch (err) {
        resultsDiv.innerHTML = `<p class="error">${err.message}</p>`;
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadResults);

    // --- Logout ---
    document.getElementById("logout-btn").addEventListener("click", () => {
      token = null;
      voteScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
    });

    // Allow Enter key to submit login
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  </script>
</body>
</html>
